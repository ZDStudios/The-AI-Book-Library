<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Book Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --ink: #1a1714;
    --ink-2: #3d3830;
    --ink-3: #6b6358;
    --ink-4: #9b9189;
    --parchment: #f7f3ee;
    --parchment-2: #ede8e0;
    --parchment-3: #e0d9ce;
    --gold: #b8860b;
    --gold-light: #d4a843;
    --gold-pale: #f5e6c0;
    --radius: 4px;
    --shadow-book: 3px 4px 12px rgba(0,0,0,0.25), 1px 2px 4px rgba(0,0,0,0.15);
    --shadow-page: 0 8px 32px rgba(0,0,0,0.12);
    /* sticky header heights */
    --hdr: 60px;
    --bar: 52px;
    --prog: 3px;
    --offset: calc(var(--hdr) + var(--bar) + var(--prog) + 24px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--parchment); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

  /* ── HEADER ── */
  header {
    background: var(--ink); padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: var(--hdr); position: sticky; top: 0; z-index: 100;
    border-bottom: 2px solid var(--gold);
  }
  .logo { font-family: 'Crimson Pro', serif; font-size: 1.4rem; font-weight: 600; color: var(--gold-light); letter-spacing: 0.02em; display: flex; align-items: center; gap: 10px; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: var(--gold-light); letter-spacing: 0.06em; text-transform: uppercase; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .refresh-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: var(--parchment-3); padding: 6px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold-light); }

  /* ── SHELF ── */
  #shelf-view { display: block; }
  #reader-view { display: none; }
  .shelf-header { padding: 3rem 3rem 1.5rem; max-width: 1200px; margin: 0 auto; }
  .shelf-title { font-family: 'Crimson Pro', serif; font-size: 2.8rem; font-weight: 300; color: var(--ink); line-height: 1.1; margin-bottom: 0.5rem; }
  .shelf-subtitle { font-size: 14px; color: var(--ink-3); }
  .shelf-stats { display: flex; gap: 2rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--parchment-3); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-size: 1.5rem; font-weight: 600; color: var(--ink); font-family: 'Crimson Pro', serif; }
  .stat-label { font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.06em; }
  .search-row { padding: 0 3rem 2rem; max-width: 1200px; margin: 0 auto; }
  .search-wrap { position: relative; max-width: 380px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  #search-input { width: 100%; padding: 9px 12px 9px 38px; border: 1px solid var(--parchment-3); border-radius: var(--radius); background: white; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color 0.2s; }
  #search-input:focus { border-color: var(--gold); }
  .shelf-section { max-width: 1200px; margin: 0 auto; padding: 0 3rem 4rem; }
  .shelf-wood { background: linear-gradient(180deg,#5c3d1e 0%,#4a2e12 40%,#3d2510 100%); height: 18px; border-radius: 0 0 3px 3px; box-shadow: 0 4px 8px rgba(0,0,0,0.3),inset 0 2px 0 rgba(255,255,255,0.08); margin-bottom: 3rem; }
  .books-row { display: flex; flex-wrap: wrap; gap: 16px; padding: 2rem 1rem 0; min-height: 180px; align-items: flex-end; }

  /* BOOK SPINE */
  .book-spine { display: flex; flex-direction: column; justify-content: space-between; width: 58px; border-radius: 3px 6px 6px 3px; cursor: pointer; position: relative; box-shadow: var(--shadow-book); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s; transform-origin: bottom center; overflow: hidden; flex-shrink: 0; }
  .book-spine::before { content:''; position:absolute; left:0;top:0;bottom:0;width:6px; background:rgba(0,0,0,0.25); border-radius:3px 0 0 3px; }
  .book-spine::after { content:''; position:absolute; right:0;top:0;bottom:0;width:2px; background:rgba(255,255,255,0.08); }
  .book-spine:hover { transform: translateY(-14px) rotate(-1deg); box-shadow: 5px 8px 20px rgba(0,0,0,0.35),2px 3px 6px rgba(0,0,0,0.2); }
  .book-title-spine { writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-family: 'Crimson Pro', serif; font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.92); padding: 10px 7px 14px; flex: 1; overflow: hidden; word-break: break-word; white-space: normal; letter-spacing: 0.05em; text-shadow: 0 1px 2px rgba(0,0,0,0.4); line-height: 1.3; }
  .book-progress-bar { position: absolute; bottom:0;left:6px;right:0;height:4px;background:rgba(0,0,0,0.3); }
  .book-progress-fill { height:100%;background:var(--gold-light);transition:width 0.3s; }
  .book-badge { position:absolute;top:6px;right:0;background:var(--gold);color:white;font-size:8px;font-weight:600;padding:2px 4px;letter-spacing:0.05em;text-transform:uppercase; }
  .col-0{background:linear-gradient(135deg,#2d4a3e,#1e3329);}
  .col-1{background:linear-gradient(135deg,#4a2d2d,#331e1e);}
  .col-2{background:linear-gradient(135deg,#1e3a5f,#122540);}
  .col-3{background:linear-gradient(135deg,#3d2d4a,#281e33);}
  .col-4{background:linear-gradient(135deg,#4a3d2d,#33291e);}
  .col-5{background:linear-gradient(135deg,#1a3d1a,#102610);}
  .col-6{background:linear-gradient(135deg,#3d1a1a,#261010);}
  .col-7{background:linear-gradient(135deg,#1a2d3d,#101c26);}
  .empty-shelf { text-align:center;padding:4rem 2rem;color:var(--ink-3); }
  .empty-shelf h3 { font-family:'Crimson Pro',serif;font-size:1.5rem;font-weight:400;margin-bottom:0.5rem; }
  .empty-shelf code { font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--parchment-2);padding:2px 6px;border-radius:3px; }
  .loading-row { display:flex;gap:16px;padding:2rem 1rem 0;align-items:flex-end; }
  .ghost-book { width:58px;height:160px;border-radius:3px 6px 6px 3px;background:var(--parchment-3);animation:shimmer 1.5s infinite; }
  .ghost-book:nth-child(2){height:140px;animation-delay:0.1s;}
  .ghost-book:nth-child(3){height:170px;animation-delay:0.2s;}
  .ghost-book:nth-child(4){height:145px;animation-delay:0.3s;}
  .ghost-book:nth-child(5){height:165px;animation-delay:0.4s;}
  @keyframes shimmer{0%,100%{opacity:0.5;}50%{opacity:1;}}

  /* ── READER ── */
  #reader-view { min-height:calc(100vh - var(--hdr));display:none;flex-direction:column; }
  #reader-view.active { display:flex; }
  .reader-topbar { background:white;border-bottom:1px solid var(--parchment-3);padding:0 1.5rem;height:var(--bar);display:flex;align-items:center;gap:0.75rem;position:sticky;top:var(--hdr);z-index:50;box-shadow:var(--shadow-page); }
  .back-btn { background:none;border:1px solid var(--parchment-3);color:var(--ink-2);padding:6px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all 0.15s;flex-shrink:0; }
  .back-btn:hover { border-color:var(--ink-3);background:var(--parchment); }
  .reader-title-bar { font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:600;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .reader-controls { display:flex;align-items:center;gap:6px;flex-shrink:0; }
  .ctrl-btn { background:none;border:1px solid var(--parchment-3);color:var(--ink-2);width:34px;height:34px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0; }
  .ctrl-btn:hover { border-color:var(--gold);color:var(--gold); }
  .ctrl-btn.active { background:var(--gold-pale);border-color:var(--gold);color:var(--gold); }
  .ctrl-btn.danger:hover { border-color:#c0392b;color:#c0392b; }
  .tts-speed { font-size:12px;font-weight:500;color:var(--ink-3);border:1px solid var(--parchment-3);padding:6px 8px;border-radius:var(--radius);cursor:pointer;background:none;font-family:inherit;transition:all 0.15s; }
  .tts-speed:hover { border-color:var(--gold);color:var(--gold); }
  .reading-progress-bar { height:var(--prog);background:var(--parchment-3);position:sticky;top:calc(var(--hdr) + var(--bar));z-index:49; }
  .reading-progress-fill { height:100%;background:var(--gold);transition:width 0.15s; }

  /* SIDEBAR */
  .reader-body { display:flex;flex:1; }
  .chapter-sidebar { width:240px;flex-shrink:0;background:white;border-right:1px solid var(--parchment-3);overflow-y:auto;position:sticky;top:calc(var(--hdr) + var(--bar) + var(--prog));height:calc(100vh - var(--hdr) - var(--bar) - var(--prog));padding:1.25rem 0; }
  .sidebar-label { font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-4);padding:0 1.25rem 0.75rem; }
  .chapter-item { display:flex;align-items:center;gap:10px;padding:7px 1.25rem;font-size:13px;color:var(--ink-3);cursor:pointer;transition:background 0.12s,border-color 0.12s;border-left:3px solid transparent;line-height:1.35; }
  .chapter-item:hover { background:var(--parchment);color:var(--ink);border-left-color:var(--parchment-3); }
  /* reading-here = currently open chapter */
  .chapter-item.reading-here { background:var(--gold-pale);color:var(--ink);border-left-color:var(--gold);font-weight:500; }
  /* done = fully scrolled past */
  .chapter-item.ch-done { color:var(--ink-4); }
  .chapter-check { width:16px;height:16px;border-radius:50%;border:1.5px solid var(--parchment-3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s; }
  .chapter-check.done { background:var(--gold);border-color:var(--gold); }
  .chapter-check.done::after { content:'';width:6px;height:4px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px); }
  /* current pin */
  .chapter-item.reading-here .chapter-check { background:var(--ink);border-color:var(--ink); }
  .chapter-item.reading-here .chapter-check::after { content:'';width:4px;height:4px;background:white;border-radius:50%; border:none; transform:none; }
  .here-badge { font-size:10px;font-weight:600;color:var(--ink);background:rgba(184,134,11,0.15);border:1px solid var(--gold);padding:1px 5px;border-radius:100px;margin-left:auto;white-space:nowrap;flex-shrink:0; }

  /* CONTENT */
  .reader-content { flex:1;overflow-y:auto;padding:3rem 4rem 8rem;max-width:820px; }
  .md-body { font-family:'Crimson Pro',serif;font-size:1.15rem;line-height:1.85;color:var(--ink-2); }
  .md-body h1 { font-size:2.2rem;font-weight:600;color:var(--ink);margin:0 0 1.5rem;line-height:1.2; scroll-margin-top: var(--offset); }
  .md-body h2 { font-size:1.7rem;font-weight:600;color:var(--ink);margin:2.5rem 0 1rem; scroll-margin-top: var(--offset); }
  .md-body h3 { font-size:1.3rem;font-weight:600;color:var(--ink);margin:2rem 0 0.75rem; scroll-margin-top: var(--offset); }
  .md-body p { margin-bottom:1.2rem; }
  .md-body ul,.md-body ol { padding-left:1.5rem;margin-bottom:1.2rem; }
  .md-body li { margin-bottom:0.4rem; }
  .md-body blockquote { border-left:3px solid var(--gold);padding:0.75rem 1.25rem;margin:1.5rem 0;background:var(--gold-pale);border-radius:0 var(--radius) var(--radius) 0;font-style:italic;color:var(--ink-2); }
  .md-body code { font-family:'JetBrains Mono',monospace;font-size:0.85em;background:var(--parchment-2);padding:2px 6px;border-radius:3px;color:var(--ink); }
  .md-body pre { background:var(--ink);border-radius:var(--radius);padding:1.25rem;overflow-x:auto;margin:1.5rem 0; }
  .md-body pre code { background:none;color:var(--parchment);padding:0;font-size:0.9rem; }
  .md-body hr { border:none;border-top:1px solid var(--parchment-3);margin:2rem 0; }
  .md-body a { color:var(--gold);text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color 0.15s; }
  .md-body a:hover { text-decoration-color:var(--gold); }
  .md-body table { width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:0.95rem; }
  .md-body th { background:var(--parchment-2);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;padding:10px 12px;text-align:left; }
  .md-body td { padding:10px 12px;border-bottom:1px solid var(--parchment-2); }
  .md-body img { max-width:100%;border-radius:var(--radius);margin:1rem 0; }

  /* TTS highlight */
  .tts-reading { background:var(--gold-pale);border-radius:3px;outline:2px solid var(--gold-light);outline-offset:2px; }

  /* ── AUTO SCROLL TOGGLE ── */
  .ctrl-btn.autoscroll-on { background:var(--ink);border-color:var(--ink);color:white; }
  .ctrl-btn.autoscroll-on:hover { background:#333;border-color:#333;color:white; }

  /* ── RESET CONFIRM ── */
  .reset-confirm { position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(26,23,20,0.6);backdrop-filter:blur(2px); }
  .reset-box { background:white;border-radius:10px;padding:2rem;max-width:360px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,0.25); }
  .reset-box h3 { font-family:'Crimson Pro',serif;font-size:1.4rem;margin-bottom:0.5rem; }
  .reset-box p { font-size:14px;color:var(--ink-3);margin-bottom:1.5rem;line-height:1.6; }
  .reset-actions { display:flex;gap:10px;justify-content:flex-end; }
  .btn-cancel { background:none;border:1px solid var(--parchment-3);color:var(--ink-2);padding:8px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit; }
  .btn-cancel:hover { border-color:var(--ink-3); }
  .btn-reset { background:#c0392b;border:none;color:white;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit; }
  .btn-reset:hover { background:#a93226; }

  /* ── TTS WIDGET ── */
  #tts-widget { position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--ink);border-radius:100px;padding:10px 20px;display:none;align-items:center;gap:14px;box-shadow:0 8px 24px rgba(0,0,0,0.35);z-index:200;min-width:320px;justify-content:center; }
  #tts-widget.visible { display:flex; }
  .tts-book-name { font-size:12px;color:rgba(255,255,255,0.5);font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .tts-main-btn { width:36px;height:36px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s; }
  .tts-main-btn:hover { background:var(--gold-light); }
  .tts-stop-btn { width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s; }
  .tts-stop-btn:hover { background:rgba(255,255,255,0.22); }
  .tts-progress-wrap { flex:1;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;cursor:pointer; }
  .tts-progress-inner { height:100%;background:var(--gold-light);border-radius:2px;pointer-events:none;transition:width 0.15s; }

  /* TOAST */
  #toast { position:fixed;bottom:6rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--parchment);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;z-index:300;white-space:nowrap; }
  #toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
  .error-banner { background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius);padding:1rem 1.25rem;margin:2rem 0;font-size:14px;color:#6b5900; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="2" y="3" width="7" height="16" rx="1" fill="#b8860b" opacity="0.8"/>
      <rect x="10" y="5" width="6" height="14" rx="1" fill="#d4a843" opacity="0.7"/>
      <rect x="17" y="2" width="3" height="18" rx="1" fill="#b8860b" opacity="0.6"/>
    </svg>
    The AI Book Library
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live sync</div>
    <button class="refresh-btn" onclick="fetchBooks()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 2L9.5 4.5L7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
  </div>
</header>

<!-- SHELF -->
<div id="shelf-view">
  <div class="shelf-header">
    <h1 class="shelf-title">Your library</h1>
    <p class="shelf-subtitle">ZDStudios/The-AI-Book-Library · Markdown books synced from GitHub</p>
    <div class="shelf-stats">
      <div class="stat"><span class="stat-num" id="stat-books">—</span><span class="stat-label">Books</span></div>
      <div class="stat"><span class="stat-num" id="stat-read">—</span><span class="stat-label">In progress</span></div>
      <div class="stat"><span class="stat-num" id="stat-finished">—</span><span class="stat-label">Finished</span></div>
    </div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#1a1714" stroke-width="1.5"/><path d="M11 11L14 14" stroke="#1a1714" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Search your library…" oninput="filterBooks()">
    </div>
  </div>
  <div class="shelf-section">
    <div class="books-row" id="books-row">
      <div class="loading-row">
        <div class="ghost-book"></div><div class="ghost-book"></div><div class="ghost-book"></div>
        <div class="ghost-book"></div><div class="ghost-book"></div>
      </div>
    </div>
    <div class="shelf-wood"></div>
  </div>
</div>

<!-- READER -->
<div id="reader-view">
  <div class="reader-topbar">
    <button class="back-btn" onclick="closeReader()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Library
    </button>
    <div class="reader-title-bar" id="reader-title"></div>
    <div class="reader-controls">
      <!-- auto-scroll toggle -->
      <button class="ctrl-btn" id="autoscroll-btn" onclick="toggleAutoScroll()" title="Auto-scroll">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2v11M4 10l3.5 3.5L11 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tts-speed" id="speed-btn" onclick="cycleSpeed()" title="Playback speed">1×</button>
      <button class="ctrl-btn" id="tts-btn" onclick="toggleTTS()" title="Read aloud">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 5H3a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h2l4 3V2L5 5Z" stroke="currentColor" stroke-width="1.3"/><path d="M11.5 5.5a3 3 0 0 1 0 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M13.5 3.5a6 6 0 0 1 0 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="ctrl-btn" id="bookmark-btn" onclick="toggleBookmark()" title="Bookmark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2h8a1 1 0 0 1 1 1v11l-5-3-5 3V3a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
      <!-- reset progress button -->
      <button class="ctrl-btn danger" onclick="confirmReset()" title="Reset reading progress">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 7.5A5.5 5.5 0 1 1 7.5 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M2 4.5V7.5H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
  <div class="reading-progress-bar">
    <div class="reading-progress-fill" id="reading-progress-fill" style="width:0%"></div>
  </div>
  <div class="reader-body">
    <div class="chapter-sidebar" id="chapter-sidebar">
      <div class="sidebar-label">Chapters</div>
      <div id="chapter-list"></div>
    </div>
    <div class="reader-content" id="reader-content" onscroll="onContentScroll()">
      <div class="md-body" id="md-body"></div>
    </div>
  </div>
</div>

<!-- TTS widget -->
<div id="tts-widget">
  <span class="tts-book-name" id="tts-book-label"></span>
  <button class="tts-main-btn" onclick="toggleTTS()" title="Play/Pause">
    <svg id="tts-main-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M3 2L12 7L3 12V2Z" fill="white"/>
    </svg>
  </button>
  <div class="tts-progress-wrap" id="tts-prog-wrap" onclick="seekTTS(event)">
    <div class="tts-progress-inner" id="tts-prog-inner" style="width:0%"></div>
  </div>
  <button class="tts-stop-btn" onclick="stopTTS()" title="Stop">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="8" rx="1" fill="white" opacity="0.7"/></svg>
  </button>
</div>

<!-- Reset confirm modal -->
<div class="reset-confirm" id="reset-modal" style="display:none">
  <div class="reset-box">
    <h3>Reset progress?</h3>
    <p>This will clear your reading position, chapter checkmarks, and finished status for <strong id="reset-book-name"></strong>. Your bookmark will also be removed.</p>
    <div class="reset-actions">
      <button class="btn-cancel" onclick="closeReset()">Cancel</button>
      <button class="btn-reset" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ──
const REPO = 'ZDStudios/The-AI-Book-Library';
const GITHUB_API = `https://api.github.com/repos/${REPO}/contents/`;
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/main/`;
const STORAGE_KEY = 'ai-book-library-v2';
const AUTO_REFRESH_MS = 5 * 60 * 1000;

// ── STATE ──
let allBooks = [];
let currentBook = null;
let currentChapters = [];
let readingData = loadData();

// auto-scroll
let autoScrollActive = false;
let autoScrollTimer = null;
const AUTO_SCROLL_SPEED = 40; // px per second

// TTS
let ttsChunks = [];
let ttsChunkIdx = 0;
let ttsPlaying = false;
let ttsPaused = false;
let ttsSpeed = 1;
let ttsUtterance = null;
let ttsKeepAlive = null;

// ── STORAGE ──
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(readingData)); } catch {}
}
function getBookData(slug) {
  if (!readingData[slug]) {
    readingData[slug] = { progress: 0, scrollPos: 0, bookmarked: false, finished: false, chaptersRead: {} };
  }
  return readingData[slug];
}

// ── FETCH BOOKS ──
async function fetchBooks() {
  document.getElementById('books-row').innerHTML =
    '<div class="loading-row">' + '<div class="ghost-book"></div>'.repeat(6) + '</div>';
  try {
    const res = await fetch(`${GITHUB_API}?t=${Date.now()}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const files = await res.json();
    allBooks = files
      .filter(f => f.type === 'file' && f.name.toLowerCase().endsWith('.md') && f.name.toLowerCase() !== 'readme.md')
      .map(f => ({
        name: f.name,
        slug: f.name.replace(/\.md$/i, ''),
        title: formatTitle(f.name.replace(/\.md$/i, '')),
        path: f.path,
        sha: f.sha
      }));
    renderBooks(allBooks);
    updateStats();
    clearTimeout(window._refreshTimer);
    window._refreshTimer = setTimeout(fetchBooks, AUTO_REFRESH_MS);
  } catch (err) {
    document.getElementById('books-row').innerHTML = `
      <div class="empty-shelf">
        <h3>Couldn't reach the library</h3>
        <p style="font-size:14px;color:var(--ink-4);margin-top:0.5rem">
          Make sure <code>${REPO}</code> is public and has .md files.<br>
          <small style="display:block;margin-top:4px">${err.message}</small>
        </p>
      </div>`;
    document.getElementById('stat-books').textContent = '0';
    document.getElementById('stat-read').textContent = '0';
    document.getElementById('stat-finished').textContent = '0';
  }
}

function formatTitle(slug) {
  return slug.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).trim();
}

// ── RENDER SHELF ──
const COLORS = ['col-0','col-1','col-2','col-3','col-4','col-5','col-6','col-7'];
function colorFor(t) {
  let h = 0;
  for (let i = 0; i < t.length; i++) h = (h * 31 + t.charCodeAt(i)) & 0xffff;
  return COLORS[h % COLORS.length];
}

function renderBooks(books) {
  if (!books.length) {
    document.getElementById('books-row').innerHTML = `
      <div class="empty-shelf">
        <h3>The shelves are empty</h3>
        <p style="font-size:14px;color:var(--ink-4);margin-top:0.5rem">Push some <code>.md</code> files to <code>${REPO}</code> and refresh.</p>
      </div>`;
    return;
  }
  const heights = [140,155,165,150,145,170,158,148,162,152];
  document.getElementById('books-row').innerHTML = books.map((b, i) => {
    const bd = getBookData(b.slug);
    const pct = Math.round(bd.progress || 0);
    const h = heights[i % heights.length];
    const isNew = !bd.progress && !bd.finished;
    return `
    <div class="book-spine ${colorFor(b.title)}"
         style="height:${h}px"
         onclick="openBook('${b.slug}')"
         title="${b.title}${pct > 0 ? ` — ${pct}% read` : ''}">
      <div class="book-title-spine">${b.title}</div>
      ${isNew ? '<div class="book-badge">New</div>' : ''}
      <div class="book-progress-bar"><div class="book-progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function filterBooks() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  renderBooks(q ? allBooks.filter(b => b.title.toLowerCase().includes(q) || b.slug.toLowerCase().includes(q)) : allBooks);
}

function updateStats() {
  document.getElementById('stat-books').textContent = allBooks.length;
  document.getElementById('stat-read').textContent =
    allBooks.filter(b => { const bd = readingData[b.slug]; return bd && bd.progress > 0 && !bd.finished; }).length;
  document.getElementById('stat-finished').textContent =
    allBooks.filter(b => readingData[b.slug]?.finished).length;
}

// ── OPEN / CLOSE BOOK ──
async function openBook(slug) {
  const book = allBooks.find(b => b.slug === slug);
  if (!book) return;
  currentBook = book;
  stopTTS();
  stopAutoScroll();

  document.getElementById('shelf-view').style.display = 'none';
  document.getElementById('reader-view').classList.add('active');
  document.getElementById('reader-title').textContent = book.title;
  document.getElementById('tts-book-label').textContent = book.title;
  document.getElementById('md-body').innerHTML = '<p style="color:var(--ink-4);font-style:italic;padding:2rem">Loading…</p>';
  document.getElementById('chapter-list').innerHTML = '';

  try {
    const res = await fetch(`${RAW_BASE}${book.path}?t=${Date.now()}`);
    if (!res.ok) throw new Error(`${res.status}`);
    const md = await res.text();
    document.getElementById('md-body').innerHTML = marked.parse(md);

    buildChapterNav();

    const bd = getBookData(slug);
    const content = document.getElementById('reader-content');

    // Restore scroll — wait two frames so layout is settled
    if (bd.scrollPos > 0) {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        content.scrollTop = bd.scrollPos;
        onContentScroll();
      }));
    } else {
      setTimeout(onContentScroll, 50);
    }

    document.getElementById('bookmark-btn').classList.toggle('active', !!bd.bookmarked);

    // Prepare TTS
    ttsChunks = [];
    ttsChunkIdx = 0;
    prepareTTS();

  } catch (err) {
    document.getElementById('md-body').innerHTML = `
      <div class="error-banner">Couldn't load <strong>${book.title}</strong>: ${err.message}</div>`;
  }
}

function closeReader() {
  stopTTS();
  stopAutoScroll();
  document.getElementById('reader-view').classList.remove('active');
  document.getElementById('shelf-view').style.display = 'block';
  currentBook = null;
  updateStats();
  renderBooks(allBooks);
}

// ── CHAPTER NAV ──
function buildChapterNav() {
  const headings = document.querySelectorAll('#md-body h1, #md-body h2');
  currentChapters = [];
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';

  const bd = currentBook ? getBookData(currentBook.slug) : {};

  headings.forEach((h, i) => {
    const id = `ch-${i}`;
    h.id = id;
    currentChapters.push({ id, el: h, text: h.textContent.trim() });

    const done = !!(bd.chaptersRead?.[id]);
    const item = document.createElement('div');
    item.className = 'chapter-item' + (done ? ' ch-done' : '');
    item.id = `nav-${id}`;
    item.innerHTML = `
      <div class="chapter-check${done ? ' done' : ''}"></div>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.textContent.trim()}</span>`;

    item.onclick = () => scrollToChapter(h);
    list.appendChild(item);
  });

  if (!headings.length) {
    list.innerHTML = '<div style="padding:0 1.25rem;font-size:13px;color:var(--ink-4);font-style:italic">No chapters found</div>';
  }
}

// ── CHAPTER SCROLL (the offset fix) ──
// The heading has scroll-margin-top set in CSS (--offset) so the browser's
// scrollIntoView already accounts for fixed bars. We scroll the *content div*
// not the window, so we do it manually with offsetTop arithmetic.
function scrollToChapter(headingEl) {
  const content = document.getElementById('reader-content');
  // offsetTop is relative to .md-body; .md-body sits inside .reader-content
  // We want the heading at the top of the viewport with ~20px breathing room.
  const paddingTop = parseInt(getComputedStyle(content).paddingTop) || 48;
  const target = headingEl.offsetTop - paddingTop + 0; // 0 extra — padding already gives breathing room
  content.scrollTo({ top: target, behavior: 'smooth' });
}

// ── SCROLL / PROGRESS ──
let scrollSaveTimer = null;
function onContentScroll() {
  if (!currentBook) return;
  const content = document.getElementById('reader-content');
  const total = content.scrollHeight - content.clientHeight;
  const pos = content.scrollTop;
  const pct = total > 0 ? Math.min(100, Math.round((pos / total) * 100)) : 0;

  document.getElementById('reading-progress-fill').style.width = pct + '%';

  const bd = getBookData(currentBook.slug);
  bd.progress = pct;
  bd.scrollPos = pos;

  // Only mark finished if user actually reaches the very end —
  // NOT on first load (pos===0 doesn't count) and only above 97%.
  // Also: never auto-mark finished if we just restored a saved position that happened to be 100%.
  // We track whether the user has actively scrolled using the _hasScrolled flag.
  if (content._hasScrolled && pct >= 97) {
    bd.finished = true;
  }

  // debounce save
  clearTimeout(scrollSaveTimer);
  scrollSaveTimer = setTimeout(saveData, 400);

  markVisibleChapters(pos, content);
}

function markVisibleChapters(scrollTop, container) {
  if (!currentBook) return;
  const bd = getBookData(currentBook.slug);
  if (!bd.chaptersRead) bd.chaptersRead = {};

  const viewBottom = scrollTop + container.clientHeight;

  // Determine which chapter heading is currently "active" —
  // the last one whose top is above (scrollTop + small offset from top of viewport).
  let activeIdx = -1;
  currentChapters.forEach((ch, i) => {
    // offsetTop of heading relative to .reader-content's scroll origin
    const top = ch.el.offsetTop;
    // 80px gives breathing room so the chapter activates slightly before the heading hits the top
    if (top <= scrollTop + 80) activeIdx = i;
  });

  currentChapters.forEach((ch, i) => {
    const navItem = document.getElementById(`nav-${ch.id}`);
    if (!navItem) return;

    const chTop = ch.el.offsetTop;
    const nextTop = currentChapters[i + 1]?.el.offsetTop ?? Infinity;
    const isActive = i === activeIdx;

    // Only tick a chapter once the reader has scrolled far enough that
    // the NEXT chapter's heading is above the top of the viewport
    // (meaning this chapter's content is fully behind us).
    const fullyPast = nextTop < scrollTop + 60;

    if (fullyPast && !bd.chaptersRead[ch.id]) {
      bd.chaptersRead[ch.id] = true;
    }

    const isDone = !!bd.chaptersRead[ch.id];

    // DOM updates
    const check = navItem.querySelector('.chapter-check');
    if (check) {
      // When it's the active chapter, show the "pin" dot regardless of done state
      check.classList.toggle('done', isDone && !isActive);
    }
    navItem.classList.toggle('reading-here', isActive);
    navItem.classList.toggle('ch-done', isDone && !isActive);

    // % badge on active chapter
    let badge = navItem.querySelector('.here-badge');
    if (isActive) {
      const total = container.scrollHeight - container.clientHeight;
      const pct = total > 0 ? Math.round((scrollTop / total) * 100) : 0;
      if (!badge) { badge = document.createElement('span'); badge.className = 'here-badge'; navItem.appendChild(badge); }
      badge.textContent = pct + '%';
      // keep sidebar in sync — use scrollIntoView on the sidebar's own scroller
      const sidebar = document.getElementById('chapter-sidebar');
      const itemTop = navItem.offsetTop - sidebar.scrollTop;
      const sidebarH = sidebar.clientHeight;
      if (itemTop < 40 || itemTop > sidebarH - 60) {
        navItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    } else {
      badge?.remove();
    }
  });
}

// Mark that the user has actively scrolled (not just a restore)
document.getElementById('reader-content').addEventListener('scroll', function() {
  this._hasScrolled = true;
}, { passive: true });

// ── AUTO SCROLL ──
function toggleAutoScroll() {
  autoScrollActive ? stopAutoScroll() : startAutoScroll();
}
function startAutoScroll() {
  autoScrollActive = true;
  document.getElementById('autoscroll-btn').classList.add('autoscroll-on');
  showToast('Auto-scroll on — scroll manually to stop');
  let last = null;
  function step(ts) {
    if (!autoScrollActive) return;
    if (last !== null) {
      const content = document.getElementById('reader-content');
      const delta = (ts - last) / 1000 * AUTO_SCROLL_SPEED;
      content.scrollTop += delta;
      // stop at bottom
      if (content.scrollTop >= content.scrollHeight - content.clientHeight - 2) {
        stopAutoScroll();
        return;
      }
    }
    last = ts;
    autoScrollTimer = requestAnimationFrame(step);
  }
  autoScrollTimer = requestAnimationFrame(step);
}
function stopAutoScroll() {
  autoScrollActive = false;
  if (autoScrollTimer) { cancelAnimationFrame(autoScrollTimer); autoScrollTimer = null; }
  document.getElementById('autoscroll-btn')?.classList.remove('autoscroll-on');
}

// Stop auto-scroll if the user manually scrolls
document.getElementById('reader-content').addEventListener('wheel', () => {
  if (autoScrollActive) stopAutoScroll();
}, { passive: true });
document.getElementById('reader-content').addEventListener('touchmove', () => {
  if (autoScrollActive) stopAutoScroll();
}, { passive: true });

// ── BOOKMARK ──
function toggleBookmark() {
  if (!currentBook) return;
  const bd = getBookData(currentBook.slug);
  bd.bookmarked = !bd.bookmarked;
  saveData();
  document.getElementById('bookmark-btn').classList.toggle('active', bd.bookmarked);
  showToast(bd.bookmarked ? 'Bookmarked' : 'Bookmark removed');
}

// ── RESET PROGRESS ──
function confirmReset() {
  if (!currentBook) return;
  document.getElementById('reset-book-name').textContent = currentBook.title;
  document.getElementById('reset-modal').style.display = 'flex';
}
function closeReset() {
  document.getElementById('reset-modal').style.display = 'none';
}
function doReset() {
  if (!currentBook) return;
  const slug = currentBook.slug;
  // Wipe all data for this book
  readingData[slug] = { progress: 0, scrollPos: 0, bookmarked: false, finished: false, chaptersRead: {} };
  saveData();
  closeReset();

  // Reset UI
  document.getElementById('reading-progress-fill').style.width = '0%';
  document.getElementById('bookmark-btn').classList.remove('active');
  document.getElementById('reader-content').scrollTop = 0;
  document.getElementById('reader-content')._hasScrolled = false;

  // Rebuild chapter nav with no ticks
  buildChapterNav();
  onContentScroll();

  showToast('Progress reset');
}

// ── TTS ──
function prepareTTS() {
  const nodes = document.querySelectorAll('#md-body p, #md-body h1, #md-body h2, #md-body h3, #md-body blockquote, #md-body li');
  ttsChunks = [];
  nodes.forEach(el => {
    const text = el.innerText?.trim();
    if (text && text.length > 2) ttsChunks.push({ text, el });
  });
  ttsChunkIdx = 0;
  ttsPaused = false;
}

function toggleTTS() {
  if (!('speechSynthesis' in window)) { showToast('Text-to-speech not supported in this browser'); return; }
  if (ttsPlaying) pauseTTS();
  else if (ttsPaused) resumeTTS();
  else startTTS();
}

function startTTS() {
  if (!ttsChunks.length) prepareTTS();
  if (!ttsChunks.length) { showToast('No text to read'); return; }
  ttsPlaying = true; ttsPaused = false;
  updateTTSUI(); speakChunk(); startKeepAlive();
}
function resumeTTS() {
  if (!ttsChunks.length) { startTTS(); return; }
  ttsPlaying = true; ttsPaused = false;
  updateTTSUI(); speakChunk(); startKeepAlive();
}
function speakChunk() {
  if (!ttsPlaying || ttsChunkIdx >= ttsChunks.length) { stopTTS(); return; }
  window.speechSynthesis.cancel();
  const chunk = ttsChunks[ttsChunkIdx];
  document.querySelectorAll('.tts-reading').forEach(el => el.classList.remove('tts-reading'));
  chunk.el.classList.add('tts-reading');
  chunk.el.scrollIntoView({ behavior: 'smooth', block: 'center' });

  const utt = new SpeechSynthesisUtterance(chunk.text);
  utt.rate = ttsSpeed; utt.lang = 'en-US';
  utt.onend = () => {
    if (!ttsPlaying) return;
    ttsChunkIdx++;
    document.getElementById('tts-prog-inner').style.width =
      Math.round((ttsChunkIdx / ttsChunks.length) * 100) + '%';
    speakChunk();
  };
  utt.onerror = e => {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    ttsChunkIdx++; speakChunk();
  };
  ttsUtterance = utt;
  window.speechSynthesis.speak(utt);
}
// Chrome 14s bug workaround
function startKeepAlive() {
  stopKeepAlive();
  ttsKeepAlive = setInterval(() => {
    if (window.speechSynthesis.speaking && !window.speechSynthesis.paused && ttsPlaying) {
      window.speechSynthesis.pause(); window.speechSynthesis.resume();
    }
  }, 10000);
}
function stopKeepAlive() { clearInterval(ttsKeepAlive); ttsKeepAlive = null; }

function pauseTTS() {
  ttsPlaying = false; ttsPaused = true;
  window.speechSynthesis.cancel(); stopKeepAlive();
  document.querySelectorAll('.tts-reading').forEach(el => el.classList.remove('tts-reading'));
  updateTTSUI();
}
function stopTTS() {
  ttsPlaying = false; ttsPaused = false; ttsChunkIdx = 0;
  window.speechSynthesis.cancel(); stopKeepAlive();
  document.querySelectorAll('.tts-reading').forEach(el => el.classList.remove('tts-reading'));
  document.getElementById('tts-prog-inner').style.width = '0%';
  updateTTSUI(true);
}
function updateTTSUI(stopped) {
  const icon = document.getElementById('tts-main-icon');
  const btn = document.getElementById('tts-btn');
  const widget = document.getElementById('tts-widget');
  if (stopped) {
    widget.classList.remove('visible'); btn.classList.remove('active');
    icon.innerHTML = '<path d="M3 2L12 7L3 12V2Z" fill="white"/>';
    return;
  }
  widget.classList.add('visible');
  btn.classList.toggle('active', ttsPlaying);
  icon.innerHTML = ttsPlaying
    ? '<rect x="2" y="2" width="4" height="10" rx="1" fill="white"/><rect x="8" y="2" width="4" height="10" rx="1" fill="white"/>'
    : '<path d="M3 2L12 7L3 12V2Z" fill="white"/>';
}
function seekTTS(e) {
  const wrap = document.getElementById('tts-prog-wrap');
  const pct = e.offsetX / wrap.clientWidth;
  ttsChunkIdx = Math.floor(pct * ttsChunks.length);
  document.getElementById('tts-prog-inner').style.width = (pct * 100) + '%';
  if (ttsPlaying) { window.speechSynthesis.cancel(); speakChunk(); }
}
const SPEEDS = [0.75, 1, 1.25, 1.5, 2];
function cycleSpeed() {
  ttsSpeed = SPEEDS[(SPEEDS.indexOf(ttsSpeed) + 1) % SPEEDS.length];
  document.getElementById('speed-btn').textContent = ttsSpeed + '×';
  if (ttsPlaying) { window.speechSynthesis.cancel(); speakChunk(); }
  showToast(`Speed: ${ttsSpeed}×`);
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('reset-modal').style.display !== 'none') { closeReset(); return; }
    if (currentBook) closeReader();
  }
  if (e.key === ' ' && currentBook && e.target.tagName !== 'INPUT') { e.preventDefault(); toggleTTS(); }
});

// Close reset modal on backdrop click
document.getElementById('reset-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('reset-modal')) closeReset();
});

fetchBooks();
</script>
</body>
</html>
