<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Book Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --ink:#1a1714; --ink-2:#3d3830; --ink-3:#6b6358; --ink-4:#9b9189;
  --parchment:#f7f3ee; --parchment-2:#ede8e0; --parchment-3:#e0d9ce;
  --gold:#b8860b; --gold-light:#d4a843; --gold-pale:#f5e6c0;
  --radius:4px;
  --hdr:60px; --bar:52px; --prog:3px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--parchment);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:var(--ink);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:var(--hdr);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold)}
.logo{font-family:'Crimson Pro',serif;font-size:1.4rem;font-weight:600;color:var(--gold-light);letter-spacing:.02em;display:flex;align-items:center;gap:10px}
.header-right{display:flex;align-items:center;gap:1rem}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--gold-light);letter-spacing:.06em;text-transform:uppercase}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.refresh-btn{background:none;border:1px solid rgba(255,255,255,.2);color:var(--parchment-3);padding:6px 12px;border-radius:var(--radius);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .2s}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold-light)}

/* SHELF */
#shelf-view{display:block}
#reader-view{display:none}
.shelf-header{padding:3rem 3rem 1.5rem;max-width:1200px;margin:0 auto}
.shelf-title{font-family:'Crimson Pro',serif;font-size:2.8rem;font-weight:300;color:var(--ink);line-height:1.1;margin-bottom:.5rem}
.shelf-subtitle{font-size:14px;color:var(--ink-3)}
.shelf-stats{display:flex;gap:2rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--parchment-3)}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-num{font-size:1.5rem;font-weight:600;color:var(--ink);font-family:'Crimson Pro',serif}
.stat-label{font-size:11px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.06em}
.search-row{padding:0 3rem 2rem;max-width:1200px;margin:0 auto}
.search-wrap{position:relative;max-width:380px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#search-input{width:100%;padding:9px 12px 9px 38px;border:1px solid var(--parchment-3);border-radius:var(--radius);background:white;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
#search-input:focus{border-color:var(--gold)}
.shelf-section{max-width:1200px;margin:0 auto;padding:0 3rem 4rem}
.shelf-wood{background:linear-gradient(180deg,#5c3d1e 0%,#4a2e12 40%,#3d2510 100%);height:18px;border-radius:0 0 3px 3px;box-shadow:0 4px 8px rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.08);margin-bottom:3rem}
.books-row{display:flex;flex-wrap:wrap;gap:16px;padding:2rem 1rem 0;min-height:180px;align-items:flex-end}
.book-spine{display:flex;flex-direction:column;justify-content:space-between;width:58px;border-radius:3px 6px 6px 3px;cursor:pointer;position:relative;box-shadow:3px 4px 12px rgba(0,0,0,.25),1px 2px 4px rgba(0,0,0,.15);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;transform-origin:bottom center;overflow:hidden;flex-shrink:0}
.book-spine::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:rgba(0,0,0,.25);border-radius:3px 0 0 3px}
.book-spine::after{content:'';position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(255,255,255,.08)}
.book-spine:hover{transform:translateY(-14px) rotate(-1deg);box-shadow:5px 8px 20px rgba(0,0,0,.35),2px 3px 6px rgba(0,0,0,.2)}
.book-title-spine{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-family:'Crimson Pro',serif;font-size:11.5px;font-weight:600;color:rgba(255,255,255,.92);padding:10px 7px 14px;flex:1;overflow:hidden;word-break:break-word;white-space:normal;letter-spacing:.05em;text-shadow:0 1px 2px rgba(0,0,0,.4);line-height:1.3}
.book-progress-bar{position:absolute;bottom:0;left:6px;right:0;height:4px;background:rgba(0,0,0,.3)}
.book-progress-fill{height:100%;background:var(--gold-light);transition:width .3s}
.book-badge{position:absolute;top:6px;right:0;background:var(--gold);color:white;font-size:8px;font-weight:600;padding:2px 4px;letter-spacing:.05em;text-transform:uppercase}
.col-0{background:linear-gradient(135deg,#2d4a3e,#1e3329)}
.col-1{background:linear-gradient(135deg,#4a2d2d,#331e1e)}
.col-2{background:linear-gradient(135deg,#1e3a5f,#122540)}
.col-3{background:linear-gradient(135deg,#3d2d4a,#281e33)}
.col-4{background:linear-gradient(135deg,#4a3d2d,#33291e)}
.col-5{background:linear-gradient(135deg,#1a3d1a,#102610)}
.col-6{background:linear-gradient(135deg,#3d1a1a,#261010)}
.col-7{background:linear-gradient(135deg,#1a2d3d,#101c26)}
.empty-shelf{text-align:center;padding:4rem 2rem;color:var(--ink-3)}
.empty-shelf h3{font-family:'Crimson Pro',serif;font-size:1.5rem;font-weight:400;margin-bottom:.5rem}
.empty-shelf code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--parchment-2);padding:2px 6px;border-radius:3px}
.loading-row{display:flex;gap:16px;padding:2rem 1rem 0;align-items:flex-end}
.ghost-book{width:58px;height:160px;border-radius:3px 6px 6px 3px;background:var(--parchment-3);animation:shimmer 1.5s infinite}
.ghost-book:nth-child(2){height:140px;animation-delay:.1s}
.ghost-book:nth-child(3){height:170px;animation-delay:.2s}
.ghost-book:nth-child(4){height:145px;animation-delay:.3s}
.ghost-book:nth-child(5){height:165px;animation-delay:.4s}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}

/* READER */
#reader-view{min-height:calc(100vh - var(--hdr));flex-direction:column}
#reader-view.active{display:flex}
.reader-topbar{background:white;border-bottom:1px solid var(--parchment-3);padding:0 1.5rem;height:var(--bar);display:flex;align-items:center;gap:.75rem;position:sticky;top:var(--hdr);z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.back-btn{background:none;border:1px solid var(--parchment-3);color:var(--ink-2);padding:6px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;flex-shrink:0}
.back-btn:hover{border-color:var(--ink-3);background:var(--parchment)}
.reader-title-bar{font-family:'Crimson Pro',serif;font-size:1.1rem;font-weight:600;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reader-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ctrl-btn{background:none;border:1px solid var(--parchment-3);color:var(--ink-2);width:34px;height:34px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold)}
.ctrl-btn.active{background:var(--gold-pale);border-color:var(--gold);color:var(--gold)}
.ctrl-btn.active-dark{background:var(--ink);border-color:var(--ink);color:white}
.ctrl-btn.danger:hover{border-color:#c0392b;color:#c0392b}
.tts-speed{font-size:12px;font-weight:500;color:var(--ink-3);border:1px solid var(--parchment-3);padding:6px 8px;border-radius:var(--radius);cursor:pointer;background:none;font-family:inherit;transition:all .15s}
.tts-speed:hover{border-color:var(--gold);color:var(--gold)}
.reading-progress-bar{height:var(--prog);background:var(--parchment-3);position:sticky;top:calc(var(--hdr) + var(--bar));z-index:49}
.reading-progress-fill{height:100%;background:var(--gold);transition:width .15s}

/* SIDEBAR */
.reader-body{display:flex;flex:1;min-height:0}
.chapter-sidebar{width:240px;flex-shrink:0;background:white;border-right:1px solid var(--parchment-3);overflow-y:auto;position:sticky;top:calc(var(--hdr) + var(--bar) + var(--prog));height:calc(100vh - var(--hdr) - var(--bar) - var(--prog));padding:1.25rem 0}
.sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-4);padding:0 1.25rem .75rem}
.chapter-item{display:flex;align-items:center;gap:10px;padding:7px 1.25rem;font-size:13px;color:var(--ink-3);cursor:pointer;border-left:3px solid transparent;line-height:1.35;user-select:none}
.chapter-item:hover{background:var(--parchment);color:var(--ink);border-left-color:var(--parchment-3)}
.chapter-item.is-current{background:var(--gold-pale);color:var(--ink);border-left-color:var(--gold);font-weight:500}
.chapter-item.is-done{color:var(--ink-4)}
.ch-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--parchment-3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.ch-check:hover{border-color:var(--gold-light)}
.ch-check.done{background:var(--gold);border-color:var(--gold)}
.ch-check.done::after{content:'';width:6px;height:4px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px)}
.chapter-item.is-current .ch-check{background:var(--ink);border-color:var(--ink)}
.chapter-item.is-current .ch-check.done::after{border-color:white}
.chapter-item.is-current .ch-check:not(.done)::after{content:'';width:4px;height:4px;border-radius:50%;background:white;border:none;transform:none}
.here-badge{font-size:10px;font-weight:600;color:var(--gold);background:rgba(184,134,11,.1);border:1px solid rgba(184,134,11,.35);padding:1px 5px;border-radius:100px;margin-left:auto;white-space:nowrap;flex-shrink:0}
.ch-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* CONTENT */
.reader-content{flex:1;overflow-y:auto;padding:3rem 4rem 8rem}
.md-body{max-width:680px}
.md-body{font-family:'Crimson Pro',serif;font-size:1.15rem;line-height:1.85;color:var(--ink-2)}
.md-body h1{font-size:2.2rem;font-weight:600;color:var(--ink);margin:0 0 1.5rem;line-height:1.2}
.md-body h2{font-size:1.7rem;font-weight:600;color:var(--ink);margin:2.5rem 0 1rem}
.md-body h3{font-size:1.3rem;font-weight:600;color:var(--ink);margin:2rem 0 .75rem}
.md-body p{margin-bottom:1.2rem}
.md-body ul,.md-body ol{padding-left:1.5rem;margin-bottom:1.2rem}
.md-body li{margin-bottom:.4rem}
.md-body blockquote{border-left:3px solid var(--gold);padding:.75rem 1.25rem;margin:1.5rem 0;background:var(--gold-pale);border-radius:0 var(--radius) var(--radius) 0;font-style:italic;color:var(--ink-2)}
.md-body code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:var(--parchment-2);padding:2px 6px;border-radius:3px;color:var(--ink)}
.md-body pre{background:var(--ink);border-radius:var(--radius);padding:1.25rem;overflow-x:auto;margin:1.5rem 0}
.md-body pre code{background:none;color:var(--parchment);padding:0;font-size:.9rem}
.md-body hr{border:none;border-top:1px solid var(--parchment-3);margin:2rem 0}
.md-body a{color:var(--gold);text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .15s}
.md-body a:hover{text-decoration-color:var(--gold)}
.md-body table{width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:.95rem}
.md-body th{background:var(--parchment-2);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;text-align:left}
.md-body td{padding:10px 12px;border-bottom:1px solid var(--parchment-2)}
.md-body img{max-width:100%;border-radius:var(--radius);margin:1rem 0}
.tts-reading{background:var(--gold-pale) !important;border-radius:3px;outline:2px solid var(--gold-light);outline-offset:2px}

/* RESET MODAL */
.modal-backdrop{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(26,23,20,.6);backdrop-filter:blur(2px)}
.modal-box{background:white;border-radius:10px;padding:2rem;max-width:360px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.25)}
.modal-box h3{font-family:'Crimson Pro',serif;font-size:1.4rem;margin-bottom:.5rem}
.modal-box p{font-size:14px;color:var(--ink-3);margin-bottom:1.5rem;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--parchment-3);color:var(--ink-2);padding:8px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit}
.btn-cancel:hover{border-color:var(--ink-3)}
.btn-danger{background:#c0392b;border:none;color:white;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:#a93226}

/* TTS WIDGET */
#tts-widget{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--ink);border-radius:100px;padding:10px 20px;display:none;align-items:center;gap:14px;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:200;min-width:300px;justify-content:center}
#tts-widget.visible{display:flex}
.tts-label{font-size:12px;color:rgba(255,255,255,.45);font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tts-play-btn{width:36px;height:36px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.tts-play-btn:hover{background:var(--gold-light)}
.tts-stop-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.12);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tts-stop-btn:hover{background:rgba(255,255,255,.22)}
.tts-bar{flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;min-width:60px}
.tts-bar-fill{height:100%;background:var(--gold-light);border-radius:2px;pointer-events:none;transition:width .15s}

/* TOAST */
#toast{position:fixed;bottom:6rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--parchment);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.error-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius);padding:1rem 1.25rem;margin:2rem 0;font-size:14px;color:#6b5900}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="2" y="3" width="7" height="16" rx="1" fill="#b8860b" opacity=".8"/>
      <rect x="10" y="5" width="6" height="14" rx="1" fill="#d4a843" opacity=".7"/>
      <rect x="17" y="2" width="3" height="18" rx="1" fill="#b8860b" opacity=".6"/>
    </svg>
    The AI Book Library
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live sync</div>
    <button class="refresh-btn" onclick="fetchBooks()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 2L9.5 4.5L7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
  </div>
</header>

<!-- SHELF -->
<div id="shelf-view">
  <div class="shelf-header">
    <h1 class="shelf-title">Your library</h1>
    <p class="shelf-subtitle">ZDStudios/The-AI-Book-Library · Markdown books synced from GitHub</p>
    <div class="shelf-stats">
      <div class="stat"><span class="stat-num" id="stat-books">—</span><span class="stat-label">Books</span></div>
      <div class="stat"><span class="stat-num" id="stat-read">—</span><span class="stat-label">In progress</span></div>
      <div class="stat"><span class="stat-num" id="stat-finished">—</span><span class="stat-label">Finished</span></div>
    </div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#1a1714" stroke-width="1.5"/><path d="M11 11L14 14" stroke="#1a1714" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Search your library…" oninput="filterBooks()">
    </div>
  </div>
  <div class="shelf-section">
    <div class="books-row" id="books-row">
      <div class="loading-row">
        <div class="ghost-book"></div><div class="ghost-book"></div><div class="ghost-book"></div>
        <div class="ghost-book"></div><div class="ghost-book"></div>
      </div>
    </div>
    <div class="shelf-wood"></div>
  </div>
</div>

<!-- READER -->
<div id="reader-view">
  <div class="reader-topbar">
    <button class="back-btn" onclick="closeReader()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Library
    </button>
    <div class="reader-title-bar" id="reader-title"></div>
    <div class="reader-controls">
      <button class="ctrl-btn" id="autoscroll-btn" onclick="toggleAutoScroll()" title="Auto-scroll">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M3.5 9.5L7 13l3.5-3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tts-speed" id="speed-btn" onclick="cycleSpeed()" title="Playback speed">1×</button>
      <button class="ctrl-btn" id="tts-btn" onclick="toggleTTS()" title="Read aloud">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 5H3a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h2l4 3V2L5 5Z" stroke="currentColor" stroke-width="1.3"/><path d="M11.5 5.5a3 3 0 0 1 0 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M13.5 3.5a6 6 0 0 1 0 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="ctrl-btn" id="bookmark-btn" onclick="toggleBookmark()" title="Bookmark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2h8a1 1 0 0 1 1 1v11l-5-3-5 3V3a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
      <button class="ctrl-btn danger" onclick="showResetModal()" title="Reset progress">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7A5 5 0 1 0 7 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M2 2v5h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
  <div class="reading-progress-bar">
    <div class="reading-progress-fill" id="reading-progress-fill" style="width:0%"></div>
  </div>
  <div class="reader-body">
    <div class="chapter-sidebar" id="chapter-sidebar">
      <div class="sidebar-section-label">Chapters</div>
      <div id="chapter-list"></div>
    </div>
    <div class="reader-content" id="reader-content">
      <div class="md-body" id="md-body"></div>
    </div>
  </div>
</div>

<!-- TTS floating widget -->
<div id="tts-widget">
  <span class="tts-label" id="tts-label"></span>
  <button class="tts-play-btn" onclick="toggleTTS()" title="Play/Pause">
    <svg id="tts-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2L12 7L3 12V2Z" fill="white"/></svg>
  </button>
  <div class="tts-bar" id="tts-bar" onclick="seekTTS(event)">
    <div class="tts-bar-fill" id="tts-fill" style="width:0%"></div>
  </div>
  <button class="tts-stop-btn" onclick="stopTTS()" title="Stop">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="8" rx="1" fill="white" opacity=".7"/></svg>
  </button>
</div>

<!-- Reset modal -->
<div class="modal-backdrop" id="reset-modal" style="display:none" onclick="if(event.target===this)hideResetModal()">
  <div class="modal-box">
    <h3>Reset progress?</h3>
    <p>This clears your scroll position, chapter checkmarks, and finished status for <strong id="reset-title"></strong>.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideResetModal()">Cancel</button>
      <button class="btn-danger" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const REPO        = 'ZDStudios/The-AI-Book-Library';
const API         = 'https://api.github.com/repos/' + REPO + '/contents/';
const RAW         = 'https://raw.githubusercontent.com/' + REPO + '/main/';
const STORE_KEY   = 'aibooklib-v3';
const REFRESH_MS  = 5 * 60 * 1000;
const TOPBAR_H    = 60 + 52 + 3; // header + reader topbar + progress bar

// ─── STATE ────────────────────────────────────────────────
var allBooks       = [];
var currentBook    = null;
var chapters       = [];   // [{id, el, text}]
var store          = loadStore();
var userScrolled   = false; // tracks if user manually scrolled (prevents false "finished")

// auto-scroll
var asActive  = false;
var asRaf     = null;
var asLastTs  = null;
var AS_PPS    = 35; // pixels per second

// TTS
var ttsChunks  = [];
var ttsIdx     = 0;
var ttsGoing   = false;
var ttsPaused  = false;
var ttsSpeed   = 1;

// ─── STORAGE ──────────────────────────────────────────────
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch(e) {}
}
function bookData(slug) {
  if (!store[slug]) store[slug] = {progress:0, scrollPos:0, bookmarked:false, finished:false, done:{}};
  return store[slug];
}

// ─── FETCH ────────────────────────────────────────────────
function fetchBooks() {
  document.getElementById('books-row').innerHTML =
    '<div class="loading-row">' + '<div class="ghost-book"></div>'.repeat(6) + '</div>';
  fetch(API + '?t=' + Date.now(), {headers:{'Accept':'application/vnd.github.v3+json'}})
    .then(function(r){ if(!r.ok) throw new Error('GitHub ' + r.status); return r.json(); })
    .then(function(files){
      allBooks = files
        .filter(function(f){ return f.type==='file' && /\.md$/i.test(f.name) && f.name.toLowerCase()!=='readme.md'; })
        .map(function(f){ return {name:f.name, slug:f.name.replace(/\.md$/i,''), title:fmtTitle(f.name.replace(/\.md$/i,'')), path:f.path}; });
      renderShelf(allBooks);
      updateStats();
      clearTimeout(window._rt);
      window._rt = setTimeout(fetchBooks, REFRESH_MS);
    })
    .catch(function(e){
      document.getElementById('books-row').innerHTML =
        '<div class="empty-shelf"><h3>Couldn\'t load library</h3><p style="font-size:14px;color:var(--ink-4);margin-top:.5rem">' + e.message + '</p></div>';
      document.getElementById('stat-books').textContent = '0';
      document.getElementById('stat-read').textContent  = '0';
      document.getElementById('stat-finished').textContent = '0';
    });
}

function fmtTitle(s) {
  return s.replace(/[-_]/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}).trim();
}

// ─── SHELF ────────────────────────────────────────────────
var COLS = ['col-0','col-1','col-2','col-3','col-4','col-5','col-6','col-7'];
function colFor(t) {
  var h=0; for(var i=0;i<t.length;i++) h=(h*31+t.charCodeAt(i))&0xffff;
  return COLS[h % COLS.length];
}

function renderShelf(books) {
  if (!books.length) {
    document.getElementById('books-row').innerHTML =
      '<div class="empty-shelf"><h3>No books yet</h3><p style="font-size:14px;color:var(--ink-4);margin-top:.5rem">Push .md files to <code>' + REPO + '</code> and refresh.</p></div>';
    return;
  }
  var hs = [140,155,165,150,145,170,158,148,162,152];
  document.getElementById('books-row').innerHTML = books.map(function(b,i){
    var bd = bookData(b.slug);
    var pct = Math.round(bd.progress || 0);
    var isNew = !bd.progress && !bd.finished;
    return '<div class="book-spine ' + colFor(b.title) + '" style="height:' + hs[i%hs.length] + 'px"' +
      ' onclick="openBook(\'' + b.slug + '\')" title="' + b.title + (pct > 0 ? ' — ' + pct + '% read' : '') + '">' +
      '<div class="book-title-spine">' + b.title + '</div>' +
      (isNew ? '<div class="book-badge">New</div>' : '') +
      '<div class="book-progress-bar"><div class="book-progress-fill" style="width:' + pct + '%"></div></div>' +
      '</div>';
  }).join('');
}

function filterBooks() {
  var q = document.getElementById('search-input').value.toLowerCase().trim();
  renderShelf(q ? allBooks.filter(function(b){ return b.title.toLowerCase().includes(q); }) : allBooks);
}

function updateStats() {
  document.getElementById('stat-books').textContent = allBooks.length;
  document.getElementById('stat-read').textContent =
    allBooks.filter(function(b){ var bd=store[b.slug]; return bd && bd.progress>0 && !bd.finished; }).length;
  document.getElementById('stat-finished').textContent =
    allBooks.filter(function(b){ return store[b.slug] && store[b.slug].finished; }).length;
}

// ─── OPEN / CLOSE ─────────────────────────────────────────
function openBook(slug) {
  var book = allBooks.find(function(b){ return b.slug===slug; });
  if (!book) return;
  currentBook = book;
  stopTTS();
  stopAS();
  userScrolled = false;

  document.getElementById('shelf-view').style.display = 'none';
  document.getElementById('reader-view').classList.add('active');
  document.getElementById('reader-title').textContent = book.title;
  document.getElementById('tts-label').textContent = book.title;
  document.getElementById('md-body').innerHTML = '<p style="color:var(--ink-4);font-style:italic;padding:1rem 0">Loading…</p>';
  document.getElementById('chapter-list').innerHTML = '';

  fetch(RAW + book.path + '?t=' + Date.now())
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(function(md){
      document.getElementById('md-body').innerHTML = marked.parse(md);
      buildNav();
      var bd = bookData(slug);
      var rc = document.getElementById('reader-content');
      // Two rAF delay so layout is fully painted before we restore scroll
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          if (bd.scrollPos > 0) {
            rc.scrollTop = bd.scrollPos;
          }
          updateProgress();
          updateNavHighlight();
        });
      });
      document.getElementById('bookmark-btn').classList.toggle('active', !!bd.bookmarked);
      ttsChunks = []; ttsIdx = 0; // reset TTS for new book
    })
    .catch(function(e){
      document.getElementById('md-body').innerHTML =
        '<div class="error-banner">Couldn\'t load <strong>' + book.title + '</strong>: ' + e.message + '</div>';
    });
}

function closeReader() {
  stopTTS();
  stopAS();
  document.getElementById('reader-view').classList.remove('active');
  document.getElementById('shelf-view').style.display = 'block';
  currentBook = null;
  updateStats();
  renderShelf(allBooks);
}

// ─── CHAPTER NAV ──────────────────────────────────────────
function buildNav() {
  chapters = [];
  var list = document.getElementById('chapter-list');
  list.innerHTML = '';
  var bd = currentBook ? bookData(currentBook.slug) : {};
  var headings = document.querySelectorAll('#md-body h1, #md-body h2');

  headings.forEach(function(h, i){
    var id = 'ch' + i;
    h.setAttribute('data-chid', id);
    chapters.push({id:id, el:h, text:h.textContent.trim()});

    var isDone = !!(bd.done && bd.done[id]);
    var item = document.createElement('div');
    item.className = 'chapter-item' + (isDone ? ' is-done' : '');
    item.id = 'nav-' + id;

    // The check circle — clicking it toggles done state manually
    var check = document.createElement('div');
    check.className = 'ch-check' + (isDone ? ' done' : '');
    check.title = isDone ? 'Mark as unread' : 'Mark as read';
    check.addEventListener('click', function(e){
      e.stopPropagation(); // don't scroll to chapter
      toggleChapterDone(id);
    });

    var span = document.createElement('span');
    span.className = 'ch-text';
    span.textContent = h.textContent.trim();

    item.appendChild(check);
    item.appendChild(span);

    // clicking the text / row scrolls to chapter
    item.addEventListener('click', function(){
      scrollToHeading(h);
    });

    list.appendChild(item);
  });
}

// Toggle a chapter's done state manually
function toggleChapterDone(id) {
  if (!currentBook) return;
  var bd = bookData(currentBook.slug);
  if (!bd.done) bd.done = {};
  bd.done[id] = !bd.done[id];
  save();
  // Refresh that nav item's appearance
  updateNavHighlight();
}

// Scroll content div to a heading — offsetTop relative to .reader-content,
// minus its own padding-top so the heading lands with breathing room at the top.
function scrollToHeading(h) {
  var rc = document.getElementById('reader-content');
  var mdBody = document.getElementById('md-body');
  // h.offsetTop is relative to md-body, mdBody.offsetTop is relative to rc
  var target = mdBody.offsetTop + h.offsetTop - 24; // 24px breathing room
  rc.scrollTo({top: Math.max(0, target), behavior: 'smooth'});
}

// ─── SCROLL / PROGRESS ────────────────────────────────────
var _saveTmr = null;
function onScroll() {
  if (!currentBook) return;
  userScrolled = true;
  updateProgress();
  updateNavHighlight();
}

function updateProgress() {
  if (!currentBook) return;
  var rc = document.getElementById('reader-content');
  var total = rc.scrollHeight - rc.clientHeight;
  var pos   = rc.scrollTop;
  var pct   = total > 0 ? Math.min(100, Math.round(pos / total * 100)) : 0;

  document.getElementById('reading-progress-fill').style.width = pct + '%';

  var bd = bookData(currentBook.slug);
  bd.progress  = pct;
  bd.scrollPos = pos;
  // Only mark finished if user actively scrolled to the end (not a restore)
  if (userScrolled && pct >= 97) bd.finished = true;

  clearTimeout(_saveTmr);
  _saveTmr = setTimeout(save, 500);
}

function updateNavHighlight() {
  if (!currentBook) return;
  var rc  = document.getElementById('reader-content');
  var top = rc.scrollTop;
  var bd  = bookData(currentBook.slug);
  if (!bd.done) bd.done = {};

  // Which chapter is the user currently in?
  var activeIdx = -1;
  var mdBody = document.getElementById('md-body');
  chapters.forEach(function(ch, i){
    var absTop = mdBody.offsetTop + ch.el.offsetTop;
    if (absTop <= top + 100) activeIdx = i;
  });

  chapters.forEach(function(ch, i){
    var navItem = document.getElementById('nav-' + ch.id);
    if (!navItem) return;
    var check = navItem.querySelector('.ch-check');
    var isCurrent = i === activeIdx;
    var isDone    = !!(bd.done[ch.id]);

    navItem.classList.toggle('is-current', isCurrent);
    navItem.classList.toggle('is-done',    isDone && !isCurrent);
    if (check) {
      check.classList.toggle('done', isDone);
      check.title = isDone ? 'Mark as unread' : 'Mark as read';
    }

    // % badge on current chapter
    var badge = navItem.querySelector('.here-badge');
    if (isCurrent) {
      var total = rc.scrollHeight - rc.clientHeight;
      var pct = total > 0 ? Math.round(top / total * 100) : 0;
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'here-badge';
        navItem.appendChild(badge);
      }
      badge.textContent = pct + '%';
      // keep sidebar scrolled to show active item
      var sb = document.getElementById('chapter-sidebar');
      var itemTop = navItem.offsetTop - sb.scrollTop;
      if (itemTop < 30 || itemTop > sb.clientHeight - 50) {
        navItem.scrollIntoView({block:'nearest', behavior:'smooth'});
      }
    } else if (badge) {
      badge.remove();
    }
  });
}

// Attach scroll listener here (not inline on the element)
document.getElementById('reader-content').addEventListener('scroll', onScroll, {passive:true});

// ─── AUTO SCROLL ──────────────────────────────────────────
function toggleAutoScroll() {
  if (asActive) stopAS(); else startAS();
}

function startAS() {
  var rc = document.getElementById('reader-content');
  if (!rc) return;
  asActive = true;
  asLastTs = null;
  document.getElementById('autoscroll-btn').classList.add('active-dark');
  showToast('Auto-scroll on · scroll wheel to stop');

  function step(ts) {
    if (!asActive) return;
    if (asLastTs !== null) {
      var elapsed = ts - asLastTs;
      // clamp delta so a tab-switch doesn't cause a huge jump
      if (elapsed < 200) {
        rc.scrollTop += elapsed / 1000 * AS_PPS;
      }
      if (rc.scrollTop >= rc.scrollHeight - rc.clientHeight - 2) {
        stopAS();
        showToast('Reached the end');
        return;
      }
    }
    asLastTs = ts;
    asRaf = requestAnimationFrame(step);
  }
  asRaf = requestAnimationFrame(step);
}

function stopAS() {
  asActive = false;
  asLastTs = null;
  if (asRaf) { cancelAnimationFrame(asRaf); asRaf = null; }
  var btn = document.getElementById('autoscroll-btn');
  if (btn) btn.classList.remove('active-dark');
}

document.getElementById('reader-content').addEventListener('wheel', function(){
  if (asActive) { stopAS(); showToast('Auto-scroll stopped'); }
}, {passive:true});
document.getElementById('reader-content').addEventListener('touchmove', function(){
  if (asActive) stopAS();
}, {passive:true});

// ─── BOOKMARK ─────────────────────────────────────────────
function toggleBookmark() {
  if (!currentBook) return;
  var bd = bookData(currentBook.slug);
  bd.bookmarked = !bd.bookmarked;
  save();
  document.getElementById('bookmark-btn').classList.toggle('active', bd.bookmarked);
  showToast(bd.bookmarked ? 'Bookmarked' : 'Bookmark removed');
}

// ─── RESET ────────────────────────────────────────────────
function showResetModal() {
  if (!currentBook) return;
  document.getElementById('reset-title').textContent = currentBook.title;
  document.getElementById('reset-modal').style.display = 'flex';
}
function hideResetModal() {
  document.getElementById('reset-modal').style.display = 'none';
}
function doReset() {
  if (!currentBook) return;
  store[currentBook.slug] = {progress:0, scrollPos:0, bookmarked:false, finished:false, done:{}};
  save();
  hideResetModal();
  userScrolled = false;
  var rc = document.getElementById('reader-content');
  rc.scrollTop = 0;
  document.getElementById('bookmark-btn').classList.remove('active');
  updateProgress();
  buildNav();
  updateNavHighlight();
  showToast('Progress reset');
}

// ─── TTS ──────────────────────────────────────────────────
// Uses Chrome's built-in speechSynthesis.
// Reads element by element (paragraph/heading), starts from whatever
// is currently visible at the top of the reader, scrolls along as it reads.

function getTTSEls() {
  // All readable text nodes in document order, no nesting
  return Array.from(document.querySelectorAll(
    '#md-body h1, #md-body h2, #md-body h3, #md-body h4,' +
    '#md-body p, #md-body li, #md-body blockquote'
  ));
}

function findVisibleStartIdx(els) {
  // Find the first el whose bounding rect top is inside (or just below) the visible reader area
  var rc = document.getElementById('reader-content');
  var rcTop = rc.getBoundingClientRect().top;
  for (var i = 0; i < els.length; i++) {
    var b = els[i].getBoundingClientRect();
    if (b.bottom > rcTop + 10) return i;
  }
  return 0;
}

function toggleTTS() {
  if (!('speechSynthesis' in window)) { showToast('TTS not supported in this browser'); return; }
  if (ttsGoing)  { pauseTTS(); return; }
  if (ttsPaused) { resumeTTS(); return; }
  startTTS();
}

function startTTS() {
  window.speechSynthesis.cancel();
  ttsChunks = getTTSEls();
  if (!ttsChunks.length) { showToast('Nothing to read'); return; }
  ttsIdx    = findVisibleStartIdx(ttsChunks);
  ttsGoing  = true;
  ttsPaused = false;
  updateTTSui();
  readNext();
}

function resumeTTS() {
  if (!ttsChunks.length) { startTTS(); return; }
  window.speechSynthesis.cancel();
  ttsGoing  = true;
  ttsPaused = false;
  updateTTSui();
  readNext();
}

function readNext() {
  // Skip empties
  while (ttsIdx < ttsChunks.length) {
    var t = (ttsChunks[ttsIdx].innerText || '').trim();
    if (t.length > 1) break;
    ttsIdx++;
  }
  if (!ttsGoing || ttsIdx >= ttsChunks.length) { stopTTS(); return; }

  var el  = ttsChunks[ttsIdx];
  var txt = (el.innerText || '').trim();

  // Highlight current element
  document.querySelectorAll('.tts-reading').forEach(function(e){ e.classList.remove('tts-reading'); });
  el.classList.add('tts-reading');

  // Scroll reading element into view inside the content div (not window)
  var rc  = document.getElementById('reader-content');
  var elR = el.getBoundingClientRect();
  var rcR = rc.getBoundingClientRect();
  if (elR.bottom > rcR.bottom - 60) {
    rc.scrollTop += elR.top - rcR.top - 60;
  }

  // Update progress bar in floating widget
  document.getElementById('tts-fill').style.width =
    Math.round(ttsIdx / ttsChunks.length * 100) + '%';

  var utt  = new SpeechSynthesisUtterance(txt);
  utt.rate = ttsSpeed;
  utt.lang = 'en-US';

  utt.onend = function() {
    if (!ttsGoing) return;
    ttsIdx++;
    readNext();
  };
  utt.onerror = function(ev) {
    // interrupted/canceled = we called cancel() intentionally, ignore
    if (ev.error === 'interrupted' || ev.error === 'canceled') return;
    ttsIdx++;
    readNext();
  };

  window.speechSynthesis.speak(utt);
}

function pauseTTS() {
  ttsGoing = false; ttsPaused = true;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.tts-reading').forEach(function(e){ e.classList.remove('tts-reading'); });
  updateTTSui();
}

function stopTTS() {
  ttsGoing = false; ttsPaused = false; ttsIdx = 0;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.tts-reading').forEach(function(e){ e.classList.remove('tts-reading'); });
  document.getElementById('tts-fill').style.width = '0%';
  updateTTSui(true);
}

function updateTTSui(stopped) {
  var widget = document.getElementById('tts-widget');
  var btn    = document.getElementById('tts-btn');
  var icon   = document.getElementById('tts-icon');
  if (!widget) return;
  if (stopped) {
    widget.classList.remove('visible');
    btn.classList.remove('active');
    icon.innerHTML = '<path d="M3 2L12 7L3 12V2Z" fill="white"/>';
    return;
  }
  widget.classList.add('visible');
  btn.classList.toggle('active', ttsGoing);
  icon.innerHTML = ttsGoing
    ? '<rect x="2" y="2" width="4" height="10" rx="1" fill="white"/><rect x="8" y="2" width="4" height="10" rx="1" fill="white"/>'
    : '<path d="M3 2L12 7L3 12V2Z" fill="white"/>';
}

function seekTTS(e) {
  if (!ttsChunks.length) return;
  var bar = document.getElementById('tts-bar');
  var pct = Math.max(0, Math.min(1, e.offsetX / bar.clientWidth));
  ttsIdx  = Math.floor(pct * ttsChunks.length);
  document.getElementById('tts-fill').style.width = Math.round(pct * 100) + '%';
  if (ttsGoing) { window.speechSynthesis.cancel(); readNext(); }
}

var SPEEDS = [0.75, 1, 1.25, 1.5, 2];
function cycleSpeed() {
  var i    = SPEEDS.indexOf(ttsSpeed);
  ttsSpeed = SPEEDS[(i + 1) % SPEEDS.length];
  document.getElementById('speed-btn').textContent = ttsSpeed + 'x';
  if (ttsGoing) { window.speechSynthesis.cancel(); readNext(); }
  showToast('Speed: ' + ttsSpeed + 'x');
}

// ─── TOAST ────────────────────────────────────────────────
var _toastTmr;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTmr);
  _toastTmr = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') {
    if (document.getElementById('reset-modal').style.display !== 'none') { hideResetModal(); return; }
    if (currentBook) closeReader();
  }
  if (e.key === ' ' && currentBook && e.target.tagName !== 'INPUT') { e.preventDefault(); toggleTTS(); }
});

// ─── BOOT ─────────────────────────────────────────────────
fetchBooks();
</script>
</body>
</html>
